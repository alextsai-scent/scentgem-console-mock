<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScentGem 統合管理コンソール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
:root{
 --color-background-primary:#ffffff;
 --color-background-secondary:#f7f5f0;
 --color-background-tertiary:#ece9e0;
 --color-text-primary:#211f1b;
 --color-text-secondary:#6b6862;
 --color-text-tertiary:#9c998f;
 --color-border-tertiary:rgba(33,31,27,0.09);
 --color-border-secondary:rgba(33,31,27,0.18);
 --color-border-info:#3b7fd4; --color-text-info:#1f5fa6; --color-background-info:#eef4fc;
 --color-border-success:#1f9b73; --color-text-success:#0e6e54; --color-background-success:#e6f5ef;
 --color-border-danger:#e1504c; --color-text-danger:#b23535; --color-background-danger:#fdeceb;
 --accent:#a4763a; --accent-ink:#26201a;
 --accent-grad:linear-gradient(135deg,#caa163 0%,#9a6c33 100%);
 --accent-soft:#f4ece0;
 --border-radius-md:10px; --border-radius-lg:16px; --border-radius-xl:22px;
 --shadow-xs:0 1px 2px rgba(33,31,27,0.05);
 --shadow-sm:0 2px 8px -2px rgba(33,31,27,0.08),0 1px 2px rgba(33,31,27,0.04);
 --shadow-md:0 12px 30px -12px rgba(33,31,27,0.16),0 3px 8px -4px rgba(33,31,27,0.08);
 --shadow-lg:0 28px 56px -20px rgba(33,31,27,0.28);
 --font-sans:"Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans",system-ui,sans-serif;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
 margin:0;min-height:100vh;color:var(--color-text-primary);font-family:var(--font-sans);
 padding:20px 18px 48px;letter-spacing:0.1px;
 background:
  radial-gradient(1100px 560px at 12% -8%, #fbf3e6 0%, rgba(251,243,230,0) 58%),
  radial-gradient(900px 640px at 102% -4%, #eef2f6 0%, rgba(238,242,246,0) 52%),
  linear-gradient(180deg,#fbfaf7 0%,#f3f1ea 100%);
 background-attachment:fixed;
 -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
}
.wrap{max-width:960px;margin:0 auto;}
::selection{background:var(--accent-soft);color:var(--accent-ink);}

select,input{
 font-family:inherit;font-size:14px;height:38px;border:1px solid var(--color-border-tertiary);
 border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);
 padding:0 12px;box-shadow:var(--shadow-xs);transition:border-color .15s ease,box-shadow .15s ease;
}
select{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:32px;
 background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239c998f' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
 background-repeat:no-repeat;background-position:right 11px center;}
select:hover,input:hover{border-color:var(--color-border-secondary);}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
input::placeholder{color:var(--color-text-tertiary);}
button{font-family:inherit;transition:transform .12s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease,color .16s ease,opacity .16s ease;}
button:active{transform:translateY(0.5px) scale(0.99);}
img{display:block;}

/* elevated surface */
.card{background:var(--color-background-primary)!important;border:1px solid var(--color-border-tertiary);box-shadow:var(--shadow-sm);}

/* sticky glass topbar */
.topbar{
 position:sticky;top:14px;z-index:20;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
 padding:11px 14px;margin-bottom:18px;border-radius:var(--border-radius-lg);
 background:rgba(255,255,255,0.72);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
 border:1px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-md);
}
.brandmark{
 width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;
 background:var(--accent-grad);color:#fff;box-shadow:0 4px 12px -3px rgba(154,108,51,0.55),inset 0 1px 0 rgba(255,255,255,0.4);flex-shrink:0;
}
.brandmark i{font-size:19px;}
.brand-title{font-size:15px;font-weight:600;letter-spacing:0.2px;}
.brand-sub{font-size:11px;font-weight:500;color:var(--color-text-tertiary);padding:2px 8px;border-radius:999px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);}

/* sidebar shell */
.sidebar{width:212px;flex-shrink:0;background:rgba(255,255,255,0.55);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 11px;box-shadow:var(--shadow-sm);}

/* room buttons */
.room-btn{box-shadow:var(--shadow-xs);transition:transform .14s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;}
.room-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);border-color:var(--color-border-secondary);}
.room-btn.is-active{box-shadow:var(--shadow-sm);}

/* generic action button hover lift */
.btn{box-shadow:var(--shadow-xs);}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.btn:disabled{box-shadow:none;transform:none;cursor:not-allowed;}
.btn-primary{background:var(--accent-ink)!important;color:#fff!important;border:1px solid var(--accent-ink)!important;}
.btn-primary:hover{filter:brightness(1.14);}

/* segmented day control */
.seg{background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:14px;padding:4px;gap:4px!important;box-shadow:inset 0 1px 2px rgba(33,31,27,0.05);}
.seg-tab{border:none!important;background:transparent!important;border-radius:10px;transition:background .16s ease,box-shadow .16s ease,color .16s ease;}
.seg-tab:hover{background:rgba(255,255,255,0.6)!important;}
.seg-tab.is-active{background:var(--color-background-primary)!important;box-shadow:var(--shadow-sm);color:var(--accent-ink);}

/* schedule grid + blocks */
.sched-wrap{box-shadow:var(--shadow-sm),inset 0 0 0 1px rgba(255,255,255,0.4);}
.sched-block{box-shadow:0 4px 12px -5px rgba(33,31,27,0.3);transition:transform .14s ease,box-shadow .16s ease,filter .16s ease;}
.sched-block:hover{transform:translateX(1px) scale(1.004);box-shadow:var(--shadow-md);filter:saturate(1.05);z-index:4;}

/* picker jacket tiles */
.jacket{box-shadow:var(--shadow-xs);transition:transform .16s ease,box-shadow .18s ease;}
.jacket:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}

/* scrollbar */
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-thumb{background:rgba(33,31,27,0.16);border-radius:999px;border:3px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:rgba(33,31,27,0.28);background-clip:content-box;}
::-webkit-scrollbar-track{background:transparent;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
#panel{animation:fadeUp .28s ease;}

@media (max-width:720px){
 body{padding:14px 12px 36px;}
 .topbar{position:sticky;top:8px;padding:10px 12px;}
 .brand-title{font-size:14px;}
 /* selects drop to their own full-width row, easy to tap */
 .topbar select{flex:1 1 calc(50% - 6px);min-width:0!important;height:40px;}
 .shell{flex-direction:column;gap:14px!important;}
 .sidebar{width:100%!important;padding:11px 11px 9px;}
 /* room list becomes a smooth, snapping horizontal rail */
 #roomlist{
  flex-direction:row!important;flex-wrap:nowrap;gap:8px!important;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;touch-action:pan-x;
  scroll-snap-type:x proximity;
  margin:0 -11px;padding:2px 11px 10px;scrollbar-width:none;
 }
 #roomlist::-webkit-scrollbar{display:none;height:0;}
 #roomlist .room-btn{min-width:208px;flex-shrink:0;scroll-snap-align:start;}
}
@media (max-width:420px){
 #roomlist .room-btn{min-width:185px;}
 .seg-tab{font-size:12px!important;}
}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <span class="brandmark"><i class="ti ti-broadcast" aria-hidden="true"></i></span>
  <span class="brand-title">ScentGem 統合管理コンソール</span>
  <span class="brand-sub">本部ビュー</span>
  <span style="flex:1;"></span>
  <select id="tenant" onchange="onTenant()" style="width:auto; min-width:178px;"></select>
  <select id="store" onchange="onStore()" style="width:auto; min-width:120px;"></select>
</div>

<div class="shell" style="display:flex; gap:16px; min-height:540px;">
  <div class="sidebar">
    <div id="storehead" style="font-size:12px; color:var(--color-text-secondary); padding:0 6px 8px; border-bottom:0.5px solid var(--color-border-tertiary); margin-bottom:8px;"></div>
    <div id="roomlist" style="display:flex; flex-direction:column; gap:4px;"></div>
  </div>
  <div id="panel" style="flex:1; min-width:0;"></div>
</div>

</div>

  $("roomlist").innerHTML=rs.map((r,i)=>{
    const s=LMAP[r.scent],on=r.playing,sel=i===ri;
    return `<button onclick="selRoom(${i})" class="room-btn${sel?' is-active':''}" style="text-align:left; border:${sel?'1.5px solid var(--accent)':'1px solid var(--color-border-tertiary)'}; background:${sel?'var(--accent-soft)':'var(--color-background-primary)'}; border-radius:var(--border-radius-md); padding:9px 11px; cursor:pointer; display:flex; align-items:center; gap:9px;">
      <span style="width:9px;height:9px;border-radius:50%;background:${on?s.c:'transparent'};border:1.5px solid ${on?s.c:'var(--color-border-secondary)'};flex-shrink:0;"></span>
      <span style="flex:1;min-width:0;">
        <span style="display:block;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</span>
        <span style="display:block;font-size:11px;color:var(--color-text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${on?'配信中 '+s.n:'停止中'}</span>
      </span></button>`;
  }).join("");
}

function t2m(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function progChips(prog){return prog.map(p=>{const s=LMAP[p[0]];
  return `<span style="display:inline-flex;align-items:center;gap:6px;padding:3px 5px 3px 3px;border-radius:999px;background:${s.c};color:${s.t};font-size:12px;font-weight:500;"><img src="${s.img}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;">${s.n}<span style="opacity:0.75;font-weight:400;">${p[1]}分</span></span>`;}).join("");}

function cartFor(r){const base=(TENANTS[ti].stores[si].id+r.id).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  return Array.from({length:12},(_,i)=>Math.round(6+(Math.sin(base*1.3+i*2.7)*0.5+0.5)*92));}
const CART_COLORS=["#AFA9EC","#FAC775","#C0DD97","#F4C0D1","#9FE1CB","#85B7EB","#888780","#F0997B","#F5C4B3","#7F77DD","#1D9E75","#BA7517"];
// 噴霧サイクルの式: 1回の噴霧秒数 = 部屋の㎡ + 20（5秒丸め・20秒〜5分でクランプ）
//   10㎡ → 30秒 / 100㎡ → 120秒（Alex基準）。広い部屋ほど長く噴霧して香りを満たす
function sprayCfg(area){
  const a=Math.max(0,+area||0);
  let on=Math.round((a+20)/5)*5;
  on=Math.min(300,Math.max(20,on));
  return {on};
}
function fmtDur(s){ if(s<60) return s+"秒"; const m=Math.floor(s/60),x=s%60; return x?(m+"分"+x+"秒"):(m+"分"); }
function sprayViz(on,g){
  const seg=`<span style="flex:${on};min-width:6px;height:100%;display:block;background:var(--accent-grad);"></span><span style="flex:${g*60};min-width:14px;height:100%;display:block;"></span>`;
  return seg.repeat(3);
}
function sprayArea(r){
  const a=r.area||40,g=r.gapMin||15,on=sprayCfg(a).on,cyc=on+g*60,perH=Math.max(1,Math.round(3600/cyc));
  const gopts=[5,10,15,30,60].map(v=>`<option value="${v}" ${v===g?'selected':''}>${v}分ごと</option>`).join("");
  return `<div class="card" style="border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:13px;font-weight:600;letter-spacing:0.2px;"><i class="ti ti-air-conditioning" style="font-size:14px;color:var(--accent);vertical-align:-2px;"></i> 噴霧サイクル設定</span>
      <span style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid rgba(164,118,58,0.3);padding:2px 9px;border-radius:999px;">広さから自動</span>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;">
      <div style="flex:0 0 auto;">
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:5px;">部屋の広さ</label>
        <div style="display:flex;align-items:center;gap:7px;">
          <input id="areaIn" type="number" min="1" max="500" value="${a}" oninput="onArea(this.value)" style="width:88px;text-align:right;font-weight:600;">
          <span style="font-size:14px;color:var(--color-text-secondary);">㎡</span>
        </div>
      </div>
      <div style="flex:1;min-width:150px;background:var(--accent-soft);border:1px solid rgba(164,118,58,0.25);border-radius:13px;padding:9px 15px;">
        <div style="font-size:11px;color:var(--accent);font-weight:600;letter-spacing:0.3px;margin-bottom:3px;">1回の噴霧時間</div>
        <div style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;">
          <span id="onBig" style="font-size:26px;font-weight:700;color:var(--accent-ink);line-height:1;">${fmtDur(on)}</span>
          <span id="onSub" style="font-size:11px;color:var(--color-text-tertiary);">＝ 広さ ${a}㎡ ＋ 20秒</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:13px;">
      <label style="font-size:12px;color:var(--color-text-secondary);">噴霧の間隔</label>
      <select id="gapIn" onchange="onGap(this.value)" style="height:34px;width:auto;">${gopts}</select>
      <span id="cycSum" style="font-size:12px;color:var(--color-text-secondary);">→ <b style="color:var(--color-text-primary);">${fmtDur(on)}噴霧</b> → <b style="color:var(--color-text-primary);">${g}分休止</b> を繰り返し（約${perH}回/時）</span>
    </div>
    <div id="cycViz" style="margin-top:12px;display:flex;align-items:center;height:10px;border-radius:999px;overflow:hidden;background:var(--color-background-tertiary);">${sprayViz(on,g)}</div>
    <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:9px;line-height:1.5;"><i class="ti ti-info-circle" style="vertical-align:-1px;"></i> 目安です（10㎡=30秒 / 100㎡=2分）。広い部屋ほど長く噴霧して香りを行き渡らせます。香りの強さ・空調に合わせて微調整してください。</div>
  </div>`;
}
function onArea(v){ const n=parseInt(v,10); if(isNaN(n)) return; curRoom().area=Math.max(1,Math.min(500,n)); paintSpray(); }
function onGap(v){ curRoom().gapMin=+v; paintSpray(); }
function paintSpray(){
  const r=curRoom(),a=r.area||40,g=r.gapMin||15,on=sprayCfg(a).on,cyc=on+g*60,perH=Math.max(1,Math.round(3600/cyc));
  if(!$("onBig")) return;
  $("onBig").textContent=fmtDur(on);
  $("onSub").textContent="＝ 広さ "+a+"㎡ ＋ 20秒";
  $("cycSum").innerHTML="→ <b style=\"color:var(--color-text-primary);\">"+fmtDur(on)+"噴霧</b> → <b style=\"color:var(--color-text-primary);\">"+g+"分休止</b> を繰り返し（約"+perH+"回/時）";
  $("cycViz").innerHTML=sprayViz(on,g);
}

function cartArea(r){
  const lv=cartFor(r),low=lv.filter(v=>v<20).length;
  const cells=lv.map((v,i)=>`<div style="flex:1;min-width:0;text-align:center;">
    <div style="height:48px;width:22px;margin:0 auto;background:var(--color-background-tertiary);border-radius:7px;display:flex;align-items:flex-end;overflow:hidden;box-shadow:inset 0 1px 2px rgba(33,31,27,0.08);">
      <div style="width:100%;height:${v}%;background:${v<20?'#e1504c':CART_COLORS[i]};border-radius:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.4);transition:height .4s ease;"></div></div>
    <div style="font-size:9px;font-weight:600;color:${v<20?'var(--color-text-danger)':'var(--color-text-tertiary)'};margin-top:5px;">${v}</div></div>`).join("");
  return `<div class="card" style="border-radius:var(--border-radius-lg);padding:13px 16px;margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;">
      <span style="font-size:12px;font-weight:500;letter-spacing:0.3px;color:var(--color-text-secondary);"><i class="ti ti-droplet" style="font-size:13px;vertical-align:-2px;color:var(--accent);"></i> カートリッジ残量（12本 / %）</span>
      ${low?`<span style="font-size:11px;color:var(--color-text-danger);"><i class="ti ti-alert-triangle" style="vertical-align:-1px;"></i> ${low}本が残りわずか</span>`:`<span style="font-size:11px;color:var(--color-text-success);"><i class="ti ti-circle-check" style="vertical-align:-1px;"></i> 残量良好</span>`}
    </div>
    <div style="display:flex;gap:4px;">${cells}</div></div>`;
}

function renderPanel(){ if(mode==="picker") return renderPicker(); if(mode==="add") return renderAdd(); renderRoom(); }

function statusArea(){
  const r=curRoom(),slots=r.sched[di]||[];
  if(selSlot!=null && slots[selSlot]){
    const sl=slots[selSlot];
    return `<div style="background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-lg);padding:13px 15px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <span style="font-size:12px;color:var(--color-text-info);font-weight:500;"><i class="ti ti-hand-finger" style="vertical-align:-2px;"></i> 選択中の配信枠（${DAYS[di]}曜）</span>
        <button onclick="clearSel()" aria-label="閉じる" style="font-size:13px;padding:2px 8px;cursor:pointer;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-x"></i></button>
      </div>
      <div style="font-size:16px;font-weight:500;margin-bottom:${sl.memo?'2px':'10px'};"><i class="ti ti-clock" style="font-size:15px;vertical-align:-2px;"></i> ${sl.s}–${sl.e}</div>
      ${sl.memo?`<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px;">${sl.memo}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">${progChips(sl.prog)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="openPicker('slot')" class="btn" style="font-size:13px;padding:8px 14px;cursor:pointer;border:1px solid var(--color-border-info);color:var(--color-text-info);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-weight:500;"><i class="ti ti-replace" style="font-size:14px;vertical-align:-2px;"></i> この枠の香りを差し替え</button>
        <button onclick="playNow()" class="btn btn-primary" style="font-size:13px;padding:8px 14px;cursor:pointer;font-weight:600;border-radius:var(--border-radius-md);"><i class="ti ti-player-play" style="font-size:14px;vertical-align:-2px;"></i> この香りを今すぐ再生</button>
        <button onclick="deleteSlot()" class="btn" style="font-size:13px;padding:8px 14px;cursor:pointer;border:1px solid var(--color-border-danger);color:var(--color-text-danger);border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-trash" style="font-size:14px;vertical-align:-2px;"></i> 削除</button>
      </div>
    </div>`;
  }
  const p=LMAP[r.scent],on=r.playing;
  return `<div class="card" style="border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-size:12px;color:var(--color-text-secondary);">${on?'現在セット中の香り':'セット中の香り（停止中）'}</span>
      <span style="font-size:11px;font-weight:500;padding:1px 8px;border-radius:999px;background:${on?'var(--color-background-success)':'var(--color-background-tertiary)'};color:${on?'var(--color-text-success)':'var(--color-text-tertiary)'};">${on?'● 再生中':'■ 停止中'}</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:11px;flex:1;min-width:170px;">
        <span style="width:46px;height:46px;border-radius:var(--border-radius-md);overflow:hidden;flex-shrink:0;opacity:${on?1:0.5};"><img src="${p.img}" alt="" style="width:100%;height:100%;object-fit:cover;"></span>
        <div style="min-width:0;">
          <div style="font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.n}</div>
          <div style="font-size:12px;color:var(--color-text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.s} ・ ${p.d}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="openPicker('live')" class="btn" style="font-size:13px;padding:8px 14px;cursor:pointer;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-replace" style="font-size:14px;vertical-align:-2px;"></i> 差し替え</button>
        ${on
          ?`<button onclick="stopLive()" class="btn" style="font-size:13px;padding:8px 16px;cursor:pointer;border:1px solid var(--color-border-danger);color:var(--color-text-danger);font-weight:500;border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-player-stop" style="font-size:14px;vertical-align:-2px;"></i> 停止</button>`
          :`<button onclick="playLive()" class="btn btn-primary" style="font-size:13px;padding:8px 18px;cursor:pointer;font-weight:600;border-radius:var(--border-radius-md);"><i class="ti ti-player-play" style="font-size:14px;vertical-align:-2px;"></i> 再生</button>`}
      </div>
    </div>
    <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:9px;"><i class="ti ti-bolt" style="vertical-align:-1px;"></i> 「再生」を押すと現地の ScentGem に配信が届きます ／ 下の枠をタップで個別編集</div>
  </div>`;
}

function renderRoom(){
  const r=curRoom(),slots=r.sched[di]||[];
  const START=7*60,END=22*60,PXH=46,totalH=(END-START)/60*PXH;
  let grid="";
  for(let h=7;h<=22;h++){const y=(h*60-START)/60*PXH;
    grid+=`<div style="position:absolute;top:${y}px;left:48px;right:0;border-top:0.5px solid var(--color-border-tertiary);"></div>
    <div style="position:absolute;top:${y-7}px;left:0;width:42px;text-align:right;font-size:11px;color:var(--color-text-tertiary);">${String(h).padStart(2,'0')}:00</div>`;}

  let blocks=slots.map((sl,idx)=>{
    const top=(t2m(sl.s)-START)/60*PXH,dur=t2m(sl.e)-t2m(sl.s),hgt=Math.max(dur/60*PXH-3,26),multi=sl.prog.length>1,sel=idx===selSlot;
    let segs=sl.prog.map((p,j)=>{const s=LMAP[p[0]];
      return `<div style="flex:${p[1]};min-height:14px;background:${s.c};${j>0?'border-top:1.5px solid var(--color-background-primary);':''}padding:3px 8px;box-sizing:border-box;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:4px;pointer-events:none;">
        <span style="font-size:11px;font-weight:500;color:${s.t};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${j===0?sl.s+' ':''}${s.n}</span>
        ${multi?`<span style="font-size:10px;color:${s.t};opacity:0.8;flex-shrink:0;">${p[1]}分</span>`:(sl.memo&&j===0?`<span style="font-size:10px;color:${s.t};opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%;flex-shrink:0;">${sl.memo}</span>`:'')}</div>`;}).join("");
    return `<div onclick="selectSlot(${idx})" class="sched-block" style="position:absolute;top:${top}px;left:52px;right:6px;height:${hgt}px;border-radius:11px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;${sel?'outline:2.5px solid var(--accent);outline-offset:1px;z-index:3;':''}">${segs}</div>`;
  }).join("");
  if(!slots.length) blocks=`<div style="position:absolute;top:120px;left:52px;right:6px;text-align:center;font-size:13px;color:var(--color-text-tertiary);">この曜日は配信枠なし</div>`;

  let nowLine="";
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  if(di===todayIdx() && nm>=START && nm<=END){
    const y=(nm-START)/60*PXH,hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
    nowLine=`<div style="position:absolute;top:${y}px;left:48px;right:0;border-top:2px solid #E24B4A;z-index:5;"></div>
    <div style="position:absolute;top:${y-4}px;left:45px;width:9px;height:9px;border-radius:50%;background:#E24B4A;z-index:6;"></div>
    <div style="position:absolute;top:${y-7}px;left:0;width:42px;text-align:right;font-size:10px;font-weight:500;color:#fff;background:#E24B4A;border-radius:3px;z-index:6;padding:0 1px;">${hh}:${mm}</div>`;
  }

  const dayTabs=DAYS.map((d,i)=>`<button onclick="selDay(${i})" class="seg-tab${i===di?' is-active':''}" style="flex:1;padding:7px 0 6px;font-size:13px;cursor:pointer;${i===di?'font-weight:600;':'color:var(--color-text-secondary);'}position:relative;">${d}${i===todayIdx()?'<span style="display:block;font-size:9px;font-weight:600;color:var(--color-text-danger);line-height:1;">今日</span>':''}</button>`).join("");

  $("panel").innerHTML=`
  ${banner?`<div style="background:var(--color-background-success);color:var(--color-text-success);font-size:13px;padding:8px 12px;border-radius:var(--border-radius-md);margin-bottom:10px;"><i class="ti ti-circle-check" style="vertical-align:-2px;"></i> ${banner}</div>`:''}
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;">
    <div>
      <div style="font-size:21px;font-weight:700;letter-spacing:-0.2px;">${r.name}</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px;">ScentGem ID: <span style="font-weight:600;color:var(--color-text-primary);">${TENANTS[ti].stores[si].id.toUpperCase()}-${r.id}</span> ・ <span style="display:inline-flex;align-items:center;gap:4px;color:var(--color-text-success);font-weight:600;background:var(--color-background-success);padding:2px 9px;border-radius:999px;"><i class="ti ti-wifi" style="font-size:13px;"></i> オンライン</span></div>
    </div>
  </div>

  ${cartArea(r)}
  ${statusArea()}
  ${sprayArea(r)}

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <span style="font-size:14px;font-weight:600;letter-spacing:0.2px;color:var(--color-text-primary);">香り配信スケジュール</span>
    <button onclick="openAdd()" class="btn" style="font-size:12px;padding:7px 13px;cursor:pointer;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-weight:500;"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;"></i> 配信枠を登録</button>
  </div>
  <div class="seg" style="display:flex;margin-bottom:12px;">${dayTabs}</div>
  <div class="sched-wrap" style="position:relative;height:${totalH}px;background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">${grid}${blocks}${nowLine}</div>`;
  banner="";
}

function selectSlot(i){selSlot=i;renderPanel();}
function clearSel(){selSlot=null;renderPanel();}
function deleteSlot(){const r=curRoom();const sl=r.sched[di][selSlot];r.sched[di].splice(selSlot,1);selSlot=null;banner="配信枠（"+sl.s+"–"+sl.e+"）を削除しました";renderPanel();}
function playNow(){const sl=curRoom().sched[di][selSlot];const k=sl.prog[0][0];curRoom().scent=k;curRoom().playing=true;banner=sl.s+"–"+sl.e+" の香り（"+LMAP[k].n+"）を現地で再生開始しました";renderList();renderPanel();}
function playLive(){curRoom().playing=true;banner="「"+LMAP[curRoom().scent].n+"」の再生を現地に配信しました";renderList();renderPanel();}
function stopLive(){curRoom().playing=false;banner="現地の再生を停止しました";renderList();renderPanel();}

function openPicker(target){mode="picker";pickerTarget=target;pick=null;pickerQuery="";renderPanel();}
function openAdd(){mode="add";renderPanel();}
function cancelTo(){mode="room";renderPanel();}

function jacketGrid(){
  const r=curRoom(),slotMode=pickerTarget==="slot",sl=slotMode?r.sched[di][selSlot]:null;
  const cur=slotMode?sl.prog[0][0]:r.scent;
  const q=pickerQuery.trim();
  const keys=KEYS.filter(k=>{const p=LMAP[k];return !q||(p.n+p.d+p.s).toLowerCase().indexOf(q.toLowerCase())>=0;});
  if(!keys.length) return `<div style="grid-column:1/-1;text-align:center;color:var(--color-text-tertiary);font-size:13px;padding:24px;">「${q}」に該当する商品がありません</div>`;
  return keys.map(k=>{const p=LMAP[k],sel=pick===k,isCur=cur===k;
    return `<button onclick="pickOne('${k}')" class="jacket" style="position:relative;aspect-ratio:1;border:none;padding:0;cursor:pointer;border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-tertiary);outline:${sel?'3px solid var(--accent)':'none'};outline-offset:2px;">
      <img src="${p.img}" alt="${p.n}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <span style="position:absolute;left:0;right:0;bottom:0;padding:22px 8px 7px;text-align:left;background:linear-gradient(to top,rgba(0,0,0,0.72),rgba(0,0,0,0));">
        <span style="display:block;font-size:11px;font-weight:500;color:#fff;line-height:1.2;">${p.n}</span>
        <span style="display:block;font-size:9px;color:rgba(255,255,255,0.8);margin-top:1px;">${p.s}</span>
      </span>
      ${isCur?'<span style="position:absolute;top:6px;left:6px;background:rgba(255,255,255,0.92);color:#185FA5;font-size:9px;font-weight:500;padding:2px 7px;border-radius:999px;">● 現在</span>':''}
      ${sel?'<span style="position:absolute;top:6px;right:6px;color:#fff;line-height:0;text-shadow:0 1px 3px rgba(0,0,0,0.5);"><i class="ti ti-circle-check" style="font-size:22px;"></i></span>':''}
    </button>`;}).join("");
}

function renderPicker(){
  const r=curRoom(),slotMode=pickerTarget==="slot",sl=slotMode?r.sched[di][selSlot]:null;
  $("panel").innerHTML=`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <button onclick="cancelTo()" style="font-size:13px;padding:5px 10px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-arrow-left" style="vertical-align:-2px;"></i></button>
    <div style="flex:1;min-width:0;"><div style="font-size:16px;font-weight:500;">${slotMode?'配信枠の香りを差し替え':'香りデータを差し替え'}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}${slotMode?' ・ '+sl.s+'–'+sl.e:' ・ Scentdays 商品ライブラリ（'+KEYS.length+'種）'}</div></div>
  </div>
  <div style="position:relative;margin-bottom:12px;">
    <i class="ti ti-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--color-text-tertiary);" aria-hidden="true"></i>
    <input id="pq" oninput="filterPicker(this.value)" value="${pickerQuery}" placeholder="商品名・シリーズで検索（例: Kyōto / Moments / rain）" style="width:100%;padding-left:34px;">
  </div>
  <div id="jackets" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px;">${jacketGrid()}</div>
  <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center;">
    <span style="font-size:12px;color:var(--color-text-tertiary);margin-right:auto;">${pick?'選択中: '+LMAP[pick].n:'商品を選んでください'}</span>
    <button onclick="cancelTo()" style="font-size:13px;padding:8px 16px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);">キャンセル</button>
    <button onclick="savePick()" ${pick?'':'disabled'} style="font-size:13px;padding:8px 18px;cursor:${pick?'pointer':'not-allowed'};border:0.5px solid ${pick?'var(--color-border-info)':'var(--color-border-tertiary)'};color:${pick?'var(--color-text-info)':'var(--color-text-tertiary)'};font-weight:500;border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-device-floppy" style="vertical-align:-2px;"></i> ${slotMode?'保存':'セットする'}</button>
  </div>`;
}
function filterPicker(v){pickerQuery=v;$("jackets").innerHTML=jacketGrid();}
function pickOne(k){pick=k;renderPicker();}
function savePick(){if(!pick)return;
  if(pickerTarget==="slot"){const sl=curRoom().sched[di][selSlot];const dur=t2m(sl.e)-t2m(sl.s)||60;sl.prog=[[pick,dur]];banner=sl.s+"–"+sl.e+" の香りを「"+LMAP[pick].n+"」に変更しました";}
  else{curRoom().scent=pick;curRoom().playing=false;banner="香りを「"+LMAP[pick].n+"」にセットしました。再生ボタンで現地に配信します";}
  mode="room";renderList();renderPanel();}

function renderAdd(){
  const r=curRoom();
  const opts=KEYS.map(k=>`<option value="${k}">${LMAP[k].n}（${LMAP[k].s}）</option>`).join("");
  $("panel").innerHTML=`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
    <button onclick="cancelTo()" style="font-size:13px;padding:5px 10px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-arrow-left" style="vertical-align:-2px;"></i></button>
    <div><div style="font-size:16px;font-weight:500;">配信枠を登録</div>
    <div style="font-size:12px;color:var(--color-text-secondary);">${r.name} ・ ${DAYS[di]}曜日</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:420px;">
    <div style="display:flex;gap:12px;">
      <div style="flex:1;"><label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;">開始</label><input id="f_s" type="time" value="09:00" style="width:100%;"></div>
      <div style="flex:1;"><label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;">終了</label><input id="f_e" type="time" value="10:00" style="width:100%;"></div>
    </div>
    <div><label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;">配信する香り</label>
      <select id="f_scent" style="width:100%;">${opts}</select></div>
    <div><label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;">メモ（任意）</label>
      <input id="f_memo" placeholder="例: 終日 BGM / イベント用 など" style="width:100%;"></div>
    <div style="font-size:11px;color:var(--color-text-tertiary);"><i class="ti ti-info-circle" style="vertical-align:-1px;"></i> 「最初これ→30分後これ」の複数ステップ配信は本実装で対応予定（今は1香り）</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
      <button onclick="cancelTo()" style="font-size:13px;padding:8px 16px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);">キャンセル</button>
      <button onclick="saveAdd()" style="font-size:13px;padding:8px 18px;cursor:pointer;border:0.5px solid var(--color-border-info);color:var(--color-text-info);font-weight:500;border-radius:var(--border-radius-md);background:var(--color-background-primary);"><i class="ti ti-calendar-plus" style="vertical-align:-2px;"></i> 登録</button>
    </div>
  </div>`;
}
function saveAdd(){
  const s=$("f_s").value,e=$("f_e").value,sc=$("f_scent").value,memo=$("f_memo").value;
  const r=curRoom();
  if(!r.sched[di])r.sched[di]=[];
  r.sched[di].push(L(s,e,[[sc,(t2m(e)-t2m(s))||60]],memo));
  r.sched[di].sort((a,b)=>t2m(a.s)-t2m(b.s));
  banner="配信枠（"+s+"–"+e+"）を登録しました";mode="room";renderPanel();
}

if(location.hash.indexOf("picker")>=0){mode="picker";}
fillSel();renderList();renderPanel();
</script>
</body>
</html>
